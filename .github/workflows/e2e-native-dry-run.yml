name: E2e native dry-run

# Pre-cut release gate: full native Electron e2e on macos-14 WITHOUT burning a
# version. Required by `pnpm release:check` on origin/main HEAD — always runs on
# every push to main (not path-filtered) so a release cut never discovers native
# breakage for the first time.
#
# Manual: Actions → E2e native dry-run → Run workflow.
on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  native:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e:native:prebuilt
