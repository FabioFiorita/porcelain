name: Pages

# Publishes the static marketing site in marketing/ to GitHub Pages.
# GitHub's "deploy from a branch" only serves the repo root or /docs, so the
# custom marketing/ folder is uploaded as a Pages artifact via Actions instead.
# One-time setup: repo Settings → Pages → Build and deployment → Source: GitHub Actions.
on:
  push:
    branches: [main]
    paths: ['marketing/**', '.github/workflows/pages.yml']
  workflow_dispatch:

# Allow the deploy job to mint a Pages deployment; read-only on contents.
permissions:
  contents: read
  pages: write
  id-token: write

# Let an in-progress run finish, but never run two deploys at once.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: marketing
      - id: deployment
        uses: actions/deploy-pages@v4
