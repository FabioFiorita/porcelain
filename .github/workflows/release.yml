name: Release

# Cut a release by pushing a version tag that matches package.json, e.g.:
#   pnpm version patch && git push --follow-tags
# electron-builder publishes the dmg + zip to a GitHub Release and writes the
# latest-mac.yml feed that electron-updater reads.
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          # Needed so `npm publish dist-daemon` can auth with NODE_AUTH_TOKEN.
          registry-url: 'https://registry.npmjs.org'
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e:prebuilt
      # Pre-create the draft release so electron-builder reuses it. Without this,
      # its dmg and zip uploaders run concurrently, both see "no release exists",
      # and each creates its own draft — splitting assets across two releases.
      - name: Ensure draft release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 \
            || gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
                 --draft --title "Porcelain ${GITHUB_REF_NAME#v}" --generate-notes
      - name: Build and publish to GitHub Releases
        run: pnpm release:prebuilt
        env:
          # Auto-provided; electron-builder reads GH_TOKEN for the github provider.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Developer ID signing — CSC_LINK is the base64 .p12, CSC_KEY_PASSWORD its
          # export password. All five are repo secrets; keep them non-empty (an empty
          # CSC_LINK makes electron-builder attempt signing and fail).
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          # Notarization (notarytool) — required for a warning-free public download.
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      # Headless remote daemon — same version as the Mac app. Enables:
      #   npx porcelain-daemon@latest serve --tailnet
      # on a Beelink/Linux host without scp'ing dist-daemon. Skips cleanly when
      # NPM_TOKEN is unset so a release still ships the Mac artifacts.
      - name: Publish porcelain-daemon to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "NPM_TOKEN not set — skipping npm publish of porcelain-daemon"
            echo "Add a classic npm automation token as repo secret NPM_TOKEN to enable."
            exit 0
          fi
          pnpm daemon:dist
          # npm publish reads package.json name/version from dist-daemon/
          npm publish ./dist-daemon --access public
