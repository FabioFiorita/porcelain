name: Release

# Cut a release by pushing a version tag that matches package.json, e.g.:
#   pnpm version patch && git push --follow-tags
# electron-builder publishes the dmg + zip to a GitHub Release and writes the
# latest-mac.yml feed that electron-updater reads. A separate Ubuntu job then
# publishes porcelain-daemon to npm via OIDC trusted publishing (no NPM_TOKEN).
#
# workflow_dispatch: re-publish porcelain-daemon for an existing tag (e.g. when
# the Mac assets already landed but npm OIDC failed). Keeps the workflow
# *filename* `release.yml` so the npm Trusted Publisher still matches.
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to (re)publish porcelain-daemon for (e.g. v0.25.0)'
        required: true
        type: string
      npm_only:
        description: 'Skip Mac build/e2e/GitHub Release; only publish porcelain-daemon'
        required: false
        type: boolean
        default: true

permissions:
  contents: write
  # OIDC short-lived token for npm trusted publishing of porcelain-daemon.
  # Trusted publisher on npmjs.com: fabiofiorita/porcelain → release.yml
  id-token: write

jobs:
  # Mac app: sign, notarize, e2e, GitHub Releases. Skipped on npm_only re-publish.
  release:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.npm_only != true }}
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e:prebuilt
      # Pre-create the draft release so electron-builder reuses it. Without this,
      # its dmg and zip uploaders run concurrently, both see "no release exists",
      # and each creates its own draft — splitting assets across two releases.
      - name: Ensure draft release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 \
            || gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
                 --draft --title "Porcelain ${GITHUB_REF_NAME#v}" --generate-notes
      - name: Build and publish to GitHub Releases
        run: pnpm release:prebuilt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

  # Headless remote daemon — same version as the Mac app. Enables:
  #   npx porcelain-daemon@latest serve --tailnet
  # Runs on ubuntu (npm's documented OIDC path); Mac-only was failing with ENEEDAUTH
  # even with id-token: write and a clean npmrc (v0.25.0).
  # Auth is OIDC trusted publishing (npm package settings → Trusted Publisher
  # → GitHub Actions → fabiofiorita/porcelain → release.yml). No NPM_TOKEN.
  publish-npm:
    # After a full release, or alone for npm_only re-publish of an existing tag.
    # When release is skipped (npm_only dispatch), needs.result is "skipped" — still run.
    needs: [release]
    if: ${{ always() && (needs.release.result == 'success' || (github.event_name == 'workflow_dispatch' && needs.release.result == 'skipped')) }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v5
        with:
          # Node ≥ 22.14 + npm ≥ 11.5.1 required for trusted publishing.
          node-version: 22
          cache: pnpm
          # No registry-url — avoids the dummy NODE_AUTH_TOKEN that blocks OIDC.
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Publish porcelain-daemon to npm
        run: |
          set -euo pipefail
          echo "GITHUB_ACTIONS=${GITHUB_ACTIONS:-}"
          echo "ref=${GITHUB_REF:-}  workflow=${GITHUB_WORKFLOW:-}  event=${GITHUB_EVENT_NAME:-}"
          if [ -z "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ] || [ -z "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" ]; then
            echo "OIDC env missing — need permissions.id-token: write on a GitHub-hosted runner"
            exit 1
          fi
          # Probe the OIDC exchange ourselves so a silent npm failure is diagnosable
          # (npm's oidc() swallows exchange errors and only later throws ENEEDAUTH).
          AUDIENCE="npm:registry.npmjs.org"
          export ID_TOKEN="$(curl -fsSL -H "Authorization: Bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=${AUDIENCE}" | python3 -c 'import sys,json; print(json.load(sys.stdin)["value"])')"
          # Decode claims (no verify) for the Trusted Publisher match fields (one line — YAML).
          python3 -c 'import os,json,base64; t=os.environ["ID_TOKEN"].split(".")[1]+"=="; c=json.loads(base64.urlsafe_b64decode(t)); ks=("sub","repository","repository_owner","repository_visibility","workflow","workflow_ref","job_workflow_ref","ref","event_name","actor"); [print(f"oidc claim {k}={c[k]}") for k in ks if k in c]'
          EXCHANGE_CODE="$(curl -sS -o /tmp/oidc-exchange.json -w '%{http_code}' -X POST \
            -H "Authorization: Bearer ${ID_TOKEN}" \
            -H "Accept: application/json" \
            "https://registry.npmjs.org/-/npm/v1/oidc/token/exchange/package/porcelain-daemon")"
          echo "oidc exchange HTTP ${EXCHANGE_CODE}"
          cat /tmp/oidc-exchange.json
          echo
          if [ "$EXCHANGE_CODE" != "200" ] && [ "$EXCHANGE_CODE" != "201" ]; then
            echo "::error::npm OIDC token exchange failed — Trusted Publisher claim mismatch or package config"
            exit 1
          fi
          # First OIDC-capable line (docs floor). Avoid npm@latest (12.x) until stable.
          npm install -g npm@11.5.2
          npm --version
          pnpm daemon:dist
          cd dist-daemon
          PUBLISH_NPMRC="$(mktemp)"
          printf 'registry=https://registry.npmjs.org/\n' > "$PUBLISH_NPMRC"
          unset NODE_AUTH_TOKEN || true
          export NPM_CONFIG_USERCONFIG="$PUBLISH_NPMRC"
          # Verbose so oidc() logs exchange success/failure instead of silent skip.
          npm publish --access public --loglevel verbose
          rm -f "$PUBLISH_NPMRC"
