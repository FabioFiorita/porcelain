name: Release

# Tag push (pnpm version X && git push --follow-tags) cuts a full release:
#   1. Mac: lint → test → build → e2e → signed/notarized GitHub Release (draft)
#   2. Linux: e2e (xvfb) → unsigned AppImage + deb + latest-linux.yml into that draft
#   3. Ubuntu: build porcelain-daemon and npm publish via OIDC trusted publishing
#
# npm Trusted Publisher (npmjs.com → porcelain-daemon): GitHub Actions →
#   FabioFiorita/porcelain → release.yml  (owner casing must match OIDC claims)
#
# workflow_dispatch is a recovery path only (re-publish npm for an existing tag
# without re-running the Mac pipeline). Normal releases do not need it.
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to re-publish porcelain-daemon for (e.g. v0.25.0)'
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  # Signed + notarized Mac app → draft GitHub Release (publish manually as Latest).
  release:
    if: ${{ github.event_name == 'push' }}
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e:native:prebuilt
      # Pre-create the draft so dmg + zip uploaders share one release (not two drafts).
      - name: Ensure draft release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 \
            || gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
                 --draft --title "Porcelain ${GITHUB_REF_NAME#v}" --generate-notes
      - name: Build and publish to GitHub Releases
        run: pnpm release:prebuilt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

  # Unsigned Linux app (AppImage + deb + latest-linux.yml) → the SAME draft the Mac
  # job pre-created. needs: [release] so that draft already exists — no draft race;
  # electron-builder --publish always joins it by tag. Only AppImage auto-updates
  # (latest-linux.yml); deb is manual-install by decision. Linux is unsigned (no
  # mac signing secrets here). Mirrors linux.yml's proven sequence: e2e under xvfb
  # builds out/ once, then release:linux:prebuilt packages that same out/ (no rebuild).
  release-linux:
    if: ${{ github.event_name == 'push' }}
    needs: [release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Electron 42 has no postinstall, so a fresh install leaves the binary
      # missing; fetch it explicitly (idempotent, cached) before anything runs it.
      - run: node node_modules/electron/install.js
      - run: pnpm exec playwright install --with-deps chromium
      # e2e is the Linux release gate; it builds out/ (asserts the committed
      # `*-linux.png` baselines) under a virtual display, and that same out/ is
      # what release:linux:prebuilt packages below.
      # Pin the Xvfb screen large enough for the window: the default Xvfb screen is
      # 1280 wide, which clamps the 1400x900 e2e window and breaks the visual baselines.
      - run: xvfb-run --auto-servernum -s "-screen 0 1600x1000x24" pnpm test:e2e:native
      - name: Build and publish Linux to GitHub Releases
        run: pnpm release:linux:prebuilt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # porcelain-daemon@<version> → npm latest (npx porcelain-daemon@latest serve --tailnet).
  # Ubuntu matches npm's documented OIDC path; no registry-url on setup-node (avoids a
  # dummy NODE_AUTH_TOKEN that blocks trusted publishing).
  publish-npm:
    needs: [release]
    # Tag push: after Mac success. Dispatch: alone (release is skipped).
    if: ${{ always() && (needs.release.result == 'success' || (github.event_name == 'workflow_dispatch' && needs.release.result == 'skipped')) }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Publish porcelain-daemon to npm
        run: |
          set -euo pipefail
          # npm CLI ≥ 11.5.1 required for OIDC trusted publishing (Node 22 ships older).
          npm install -g npm@11.5.2
          pnpm daemon:dist
          cd dist-daemon
          # Clean userconfig: no always-auth / dummy token from setup-node.
          PUBLISH_NPMRC="$(mktemp)"
          printf 'registry=https://registry.npmjs.org/\n' > "$PUBLISH_NPMRC"
          unset NODE_AUTH_TOKEN || true
          export NPM_CONFIG_USERCONFIG="$PUBLISH_NPMRC"
          # Provenance is automatic under trusted publishing.
          npm publish --access public
          rm -f "$PUBLISH_NPMRC"
