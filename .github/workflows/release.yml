name: Release

# Cut a release by pushing a version tag that matches package.json, e.g.:
#   pnpm version patch && git push --follow-tags
# electron-builder publishes the dmg + zip to a GitHub Release and writes the
# latest-mac.yml feed that electron-updater reads.
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - name: Build and publish to GitHub Releases
        run: pnpm release
        env:
          # Auto-provided; electron-builder reads GH_TOKEN for the github provider.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No signing cert on the runner — ship an unsigned build. Do NOT pass an
          # empty CSC_LINK here: a *defined-but-empty* CSC_LINK makes electron-builder
          # attempt signing and fail ("<projectDir> not a file"); leaving it undefined
          # plus this flag makes it cleanly skip signing.
          #
          # To sign + notarize later: add repo secrets CSC_LINK (base64 .p12),
          # CSC_KEY_PASSWORD, APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID;
          # map them into this env block, set `notarize: true` in electron-builder.yml,
          # and delete the line below. (Unsigned builds disable macOS auto-update.)
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
