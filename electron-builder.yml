appId: com.fabiofiorita.porcelain
productName: Porcelain
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.claude,.agents,.codex,docs}/**'
  - '!{biome.json,components.json,vitest.config.ts,setupTests.ts,AGENTS.md,CLAUDE.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/**
mac:
  target:
    - target: dmg
      arch: [arm64]
    # zip is what electron-updater actually downloads on macOS
    - target: zip
      arch: [arm64]
  category: public.app-category.developer-tools
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # flip to true once notarytool credentials exist
  # (APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID env vars)
  notarize: false
dmg:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
publish:
  provider: github
  owner: fabiofiorita
  repo: porcelain
