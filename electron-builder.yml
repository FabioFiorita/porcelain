appId: com.fabiofiorita.porcelain
productName: Porcelain
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.claude,.agents,.codex,docs}/**'
  - '!{biome.json,components.json,vitest.config.ts,setupTests.ts,AGENTS.md,CLAUDE.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  - resources/**
mac:
  target:
    - target: dmg
      arch: [arm64]
    # zip is what electron-updater actually downloads on macOS
    - target: zip
      arch: [arm64]
  category: public.app-category.developer-tools
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # Pin the distribution identity: the CSC_LINK p12 also carries the Apple
  # Development cert, so name the Developer ID one explicitly.
  identity: 'Fabio Luiz Fiorita Pontes (9QH8M89WF9)'
  # Notarize via notarytool using APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD /
  # APPLE_TEAM_ID env vars (set as repo secrets).
  notarize: true
dmg:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
publish:
  provider: github
  owner: fabiofiorita
  repo: porcelain
