<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <!-- iPad/mobile Safari renders a scaled desktop canvas without this; inert in Electron.
         maximum-scale/user-scalable stop iOS input-focus zoom-panning; viewport-fit=cover
         reaches under the notch/home bar; interactive-widget=resizes-content makes the soft
         keyboard shrink the layout viewport (so the terminal refits) instead of overlaying. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <title>Porcelain</title>
    <!-- https://developer.mozilla.org/en-US/docs/Web/HTTP/CSP -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' http://127.0.0.1:* ws://127.0.0.1:* http: https: ws: wss:"
    />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
